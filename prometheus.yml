global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "genai-chatbot-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "backend:8000"
        labels:
          service: "backend"
          app: "genai-chatbot"

  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"
        labels:
          service: "prometheus"
          app: "genai-chatbot"