
services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - redis

    volumes:
      - ./storage:/app/storage
      - ./repos:/app/repos

    restart: unless-stopped


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

    restart: unless-stopped


  redis:
    image: redis:7-alpine

    container_name: redis

    ports:
      - "6379:6379"

    restart: unless-stopped

    volumes:
      - redis-data:/data

  nginx:
    build: ./nginx

    container_name: nginx

    ports:
    - "80:80"

    depends_on:
    - frontend
    - backend

  

  prometheus:
    image: prom/prometheus

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - backend

  grafana:
    image: grafana/grafana

    container_name: grafana

    ports:
      - "3001:3000"

    depends_on:
      - prometheus

    volumes:
      - grafana-storage:/var/lib/grafana


volumes:
  grafana-storage:
  redis-data:

restart: unless-stopped