name: MW GenAI Chatbot CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:

  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Secrets
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_DB: 0
        run: |
          python - <<EOF
          import os
          print("Mongo exists:", os.getenv("MONGO_URL") is not None)
          print("Mongo length:", len(os.getenv("MONGO_URL","")))
          print("Starts with:", os.getenv("MONGO_URL","")[:15])
          EOF

      - name: Verify Backend Imports
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_DB: 0
        run: |
          python -c "import app"

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest

    needs:
      - backend
      - frontend

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t chatbot-backend .

      - name: Build Frontend Image
        run: docker build -t chatbot-frontend ./frontend